plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.4.10'
    id 'org.jetbrains.kotlin.kapt' version '1.4.10'
}

repositories {
    jcenter()
    mavenCentral()
}

dependencies {
    /*
     * The versions of the group "org.jetbrains.kotlin" is optional
     * because they can be inferred from the applied plugin.
     * https://kotlinlang.org/docs/reference/using-gradle.html
     */
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8'
    // https://kotlinlang.org/api/latest/kotlin.test/
    testImplementation 'org.jetbrains.kotlin:kotlin-test'
    testImplementation 'org.jetbrains.kotlin:kotlin-test-junit5'

    def coroutines_version = '1.3.9'
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$coroutines_version"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutines_version"

    implementation 'com.squareup.moshi:moshi-kotlin:1.10.0'
    implementation 'com.google.code.gson:gson:2.8.6'
    testImplementation 'io.mockk:mockk:1.9.3'

    // Use Rx only if your client sticks with it.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-rx3:$coroutines_version"
    implementation 'io.reactivex.rxjava3:rxkotlin:3.0.1'
}

compileKotlin.kotlinOptions.jvmTarget = '1.8'
compileTestKotlin.kotlinOptions.jvmTarget = '1.8'